name: publish bottles

# Publish bottles AFTER a PR is merged, from trusted `main`, using
# `brew pr-upload` (NOT `brew pr-pull`).
#
# `pr-pull` is a *pre-merge* tool: with `--no-cherry-pick` it derives its diff
# base from `merge-base(origin/HEAD, GITHUB_SHA)`, which post-merge is the merge
# commit itself -> empty diff -> "formulae don't need bottles" -> it skips. And
# *with* cherry-pick it needs the (deleted) PR branch.
#
# `pr-upload` has no such check: it reads the `*.bottle.json` files in the cwd,
# runs `brew bottle --merge --write` (writes the bottle block + commits), checks
# the formula version matches the bottle version, and uploads to GHCR. So we
# fetch the merged PR's already-built bottle artifacts and hand them to it.
#
# SECURITY: relies on Mergify merge protections requiring approvals AND the
# inherited `dismiss_reviews` (stale approvals dropped on new commits), so the
# merged commit == the reviewed one. No privileged `pull_request_target`; we
# only publish merged `main`.

on:
  push:
    branches:
      - main
    # Only formula merges produce bottles. The bottle PR we open also merges a
    # change to Formula/**, but its head branch is bottle/* -> the loop-breaker
    # in the first step skips it.
    paths:
      - Formula/**

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      actions: read          # download the merged PR's bottle artifacts
      contents: write        # push the bottle/* branch
      packages: write        # upload bottles to GHCR
      pull-requests: write   # find the merged PR + open the bottle PR
    steps:
      - name: Resolve merged PR and its bottle build
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # The PR this push merged. Empty for direct pushes (none expected now).
          num=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" --jq '.[0].number // empty')
          if [ -z "$num" ]; then
            echo "No PR for this commit — nothing to publish."
            exit 0
          fi
          # One API call for both head ref name and oid.
          pr_json=$(gh pr view "$num" --repo "$GITHUB_REPOSITORY" --json headRefName,headRefOid)
          head_ref=$(jq -r .headRefName <<<"$pr_json")
          head=$(jq -r .headRefOid <<<"$pr_json")
          # Loop-breaker: the bottle PR's own merge is also a push to main
          # touching Formula/**, which re-triggers this workflow. Its head ref
          # starts with bottle/ -> nothing to publish. (headRefName persists in
          # the PR record even after the branch is auto-deleted on merge.)
          case "$head_ref" in
            bottle/*)
              echo "Merged PR #${num} is a bottle PR (${head_ref}) — nothing to publish."
              exit 0
              ;;
          esac
          run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/tests.yml/runs?event=pull_request&head_sha=${head}" \
                --jq '.workflow_runs[0].id // empty')
          if [ -z "$run" ]; then
            # An empty id would make `gh run download ""` fall back to unrelated
            # repo artifacts. Fail loudly instead of publishing the wrong bottles.
            echo "::error::No tests.yml run found for PR #${num} (head ${head}); cannot publish bottles."
            exit 1
          fi
          echo "number=${num}" >> "$GITHUB_OUTPUT"
          echo "run=${run}" >> "$GITHUB_OUTPUT"
          echo "Merged PR #${num} (head ${head}); bottles from tests.yml run ${run}"

      - name: Set up Homebrew
        if: steps.pr.outputs.number != ''
        uses: Homebrew/actions/setup-homebrew@d0dd492210067c1b5f8857ab6c5dd52c29944e44 # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        if: steps.pr.outputs.number != ''
        uses: Homebrew/actions/git-user-config@d0dd492210067c1b5f8857ab6c5dd52c29944e44 # main

      - name: Download the merged PR's bottles
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh run download "${{ steps.pr.outputs.run }}" --repo "$GITHUB_REPOSITORY" \
            --pattern 'bottles_*' --dir bottles-download
          # pr-upload reads *.bottle.json from one directory; flatten the
          # per-platform artifacts (bottles_macos-26/, bottles_ubuntu-latest/, …).
          mkdir -p bottles
          find bottles-download -name '*.bottle.*' -exec mv {} bottles/ \;
          echo "Bottle JSONs:"; ls -1 bottles/*.bottle.json

      - name: Publish bottles and write the bottle block
        if: steps.pr.outputs.number != ''
        working-directory: bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.repository_owner }}
        run: brew pr-upload --root-url="https://ghcr.io/v2/mergifyio/tap"

      - name: Open bottle PR
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # brew pr-upload edited + committed the bottle block in the tap repo
          # that setup-homebrew cloned (NOT the workspace). Operate there.
          tap_dir="$(brew --repository mergifyio/tap)"
          cd "$tap_dir"
          git fetch origin main
          # Name the branch + PR after the formula pr-upload just bottled (the
          # single Formula/*.rb in HEAD), so the flow works for any formula in
          # the tap. `|| true` so a no-match doesn't abort under pipefail.
          formula_file=$(git diff-tree --no-commit-id --name-only -r HEAD \
                         | grep -E '^Formula/.+\.rb$' | head -1 || true)
          if [ -z "$formula_file" ]; then
            echo "Latest commit touches no Formula/*.rb — nothing to publish."
            exit 0
          fi
          # Idempotent guard: if origin/main already carries this formula's exact
          # content (bottle block included) there is nothing to publish. Covers
          # both 'pr-upload made no commit' and a re-run after the bottle merged,
          # even when main advanced underneath us.
          if git diff --quiet HEAD origin/main -- "$formula_file"; then
            echo "${formula_file} already matches origin/main — nothing to publish."
            exit 0
          fi
          formula=$(basename "$formula_file" .rb)
          branch="bottle/${formula}-${GITHUB_SHA::7}"
          # Don't re-open if a bottle PR for this branch is already open (re-run).
          if [ -n "$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$branch" --state open --json number --jq '.[0].number // empty')" ]; then
            echo "A bottle PR for ${branch} is already open — nothing to do."
            exit 0
          fi
          git remote set-url --push origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git branch -f "$branch" HEAD
          git push --force origin "$branch"
          # Title is conventional (chore:) and body is >=48 chars, to satisfy the
          # inherited org merge protections. No backticks in the body (it is a
          # double-quoted shell string).
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$branch" \
            --title "chore: ${formula} bottle" \
            --body "Automated bottle publish for ${formula}. Adds the precompiled bottle block, built and uploaded to GHCR by CI. Auto-merged via the bottle queue with no review required."
