name: publish bottles

# Publish bottles AFTER a PR is merged, from trusted `main`, using
# `brew pr-upload` (NOT `brew pr-pull`).
#
# `pr-pull` is a *pre-merge* tool: with `--no-cherry-pick` it derives its diff
# base from `merge-base(origin/HEAD, GITHUB_SHA)`, which post-merge is the merge
# commit itself -> empty diff -> "formulae don't need bottles" -> it skips. And
# *with* cherry-pick it needs the (deleted) PR branch.
#
# `pr-upload` has no such check: it reads the `*.bottle.json` files in the cwd,
# runs `brew bottle --merge --write` (writes the bottle block + commits), checks
# the formula version matches the bottle version, and uploads to GHCR. So we
# fetch the merged PR's already-built bottle artifacts and hand them to it.
#
# SECURITY: relies on the `main` ruleset requiring approval AND "dismiss stale
# approvals when new commits are pushed", so the merged commit == the reviewed
# one. We never push to main directly (the ruleset forbids it); the bottle
# block lands via a `bottle/*` PR that Mergify auto-merges. No privileged
# `pull_request_target`; we only publish merged `main`.

on:
  push:
    branches:
      - main
    # Only formula merges produce bottles. Mergify merging the bottle PR we
    # open below also pushes to main; the loop guard below skips bottle/* PRs.
    paths:
      - Formula/**

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      actions: read          # download the merged PR's bottle artifacts
      contents: write        # push the bottle branch + open the PR
      packages: write        # upload bottles to GHCR
      pull-requests: write   # find the merged PR + open the bottle PR
    steps:
      - name: Resolve merged PR and its bottle build
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # The PR this push merged. Empty for a direct push with no associated
          # PR -> the job no-ops.
          num=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" --jq '.[0].number // empty')
          if [ -z "$num" ]; then
            echo "No PR for this commit — nothing to publish."
            echo "number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Loop guard: when Mergify merges the bottle PR we open below, this
          # workflow re-fires. Bottle PRs live on `bottle/*` -> no-op (no bottles
          # to publish for an already-published bottle commit).
          headref=$(gh pr view "$num" --repo "$GITHUB_REPOSITORY" --json headRefName --jq .headRefName)
          case "$headref" in
            bottle/*)
              echo "Merged PR #${num} is a bottle PR (${headref}) — nothing to publish."
              echo "number=" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          echo "number=${num}" >> "$GITHUB_OUTPUT"
          head=$(gh pr view "$num" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq .headRefOid)
          run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/tests.yml/runs?event=pull_request&head_sha=${head}" \
                --jq '.workflow_runs[0].id // empty')
          echo "run=${run}" >> "$GITHUB_OUTPUT"
          echo "Merged PR #${num} (head ${head}); bottles from tests.yml run ${run}"

      - name: Set up Homebrew
        if: steps.pr.outputs.number != ''
        uses: Homebrew/actions/setup-homebrew@d0dd492210067c1b5f8857ab6c5dd52c29944e44 # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        if: steps.pr.outputs.number != ''
        uses: Homebrew/actions/git-user-config@d0dd492210067c1b5f8857ab6c5dd52c29944e44 # main

      - name: Download the merged PR's bottles
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh run download "${{ steps.pr.outputs.run }}" --repo "$GITHUB_REPOSITORY" \
            --pattern 'bottles_*' --dir bottles-download
          # pr-upload reads *.bottle.json from one directory; flatten the
          # per-platform artifacts (bottles_macos-26/, bottles_ubuntu-latest/, …).
          mkdir -p bottles
          find bottles-download -name '*.bottle.*' -exec mv {} bottles/ \;
          echo "Bottle JSONs:"; ls -1 bottles/*.bottle.json

      - name: Publish bottles and write the bottle block
        if: steps.pr.outputs.number != ''
        working-directory: bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.repository_owner }}
        run: brew pr-upload --root-url="https://ghcr.io/v2/mergifyio/tap"

      - name: Open bottle PR for Mergify to auto-merge
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # `brew pr-upload` already committed the bottle block in the tap repo.
          # Push that commit to a `bottle/*` branch (NOT main) and open a PR.
          # Opening via GITHUB_TOKEN means this PR does NOT trigger tests.yml
          # (no re-bottle). Mergify's `bottle` queue auto-merges it (no review).
          branch="bottle/pr-${PR_NUMBER}-${RUN_ID}"
          tap_name="${GITHUB_REPOSITORY/homebrew-/}"        # Mergifyio/tap
          tap_dir="$(brew --repository "$tap_name")"
          git -C "$tap_dir" push origin "HEAD:refs/heads/${branch}"
          gh pr create --repo "$GITHUB_REPOSITORY" --base main --head "$branch" \
            --title "chore: publish bottles for #${PR_NUMBER}" \
            --body "Automated bottle upload for #${PR_NUMBER}. Auto-merged by Mergify (no review needed)."
