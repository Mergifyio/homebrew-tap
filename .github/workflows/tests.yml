name: brew test-bot

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  test-bot:
    # Skip draft PRs (don't burn the paid matrix on every draft sync; marking
    # the PR ready builds it) and bottle/* PRs (already built; opened by
    # publish.yml — belt-and-suspenders, since GITHUB_TOKEN-opened PRs don't
    # trigger workflows anyway).
    if: >-
      github.event.pull_request.draft == false &&
      !startsWith(github.event.pull_request.head.ref, 'bottle/')
    strategy:
      matrix:
        # macOS arm64 only — Homebrew no longer ships Intel-macOS bottles for
        # our deps (pydantic/libyaml/rust stop at sonoma), so macos-15-intel
        # can't be bottled. Intel Macs install via source build.
        os: [ macos-26 ]
        include:
          - os: ubuntu-latest
            container: ghcr.io/homebrew/brew:main
          - os: ubuntu-24.04-arm
            container: ghcr.io/homebrew/brew:main
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    permissions:
      actions: read
      checks: read
      contents: read
      packages: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@d0dd492210067c1b5f8857ab6c5dd52c29944e44 # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax
      - name: Base64-encode GITHUB_TOKEN for HOMEBREW_DOCKER_REGISTRY_TOKEN
        id: base64-encode
        if: github.event_name == 'pull_request'
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          base64_token=$(echo -n "${TOKEN}" | base64 | tr -d "\n")
          echo "::add-mask::${base64_token}"
          echo "token=${base64_token}" >> "${GITHUB_OUTPUT}"
      - run: brew test-bot --only-formulae --root-url=https://ghcr.io/v2/mergifyio/tap
        if: github.event_name == 'pull_request'
        env:
          HOMEBREW_DOCKER_REGISTRY_TOKEN: ${{ steps.base64-encode.outputs.token }}

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'

  # Single, stable required check that gates merges (referenced by .mergify.yml
  # and the main ruleset) instead of the brittle per-matrix `test-bot (...)`
  # names. Green only when the whole test-bot matrix succeeds. Skipped on drafts
  # (they can't merge); a non-draft PR whose test-bot was skipped — e.g. a human
  # branch named bottle/* dodging the matrix — reports failure here and is
  # blocked.
  all-green:
    name: all-green
    if: always() && github.event.pull_request.draft == false
    needs: [test-bot]
    runs-on: ubuntu-latest
    steps:
      - name: Require all test-bot jobs to succeed
        run: |
          echo "test-bot result: ${{ needs.test-bot.result }}"
          [ "${{ needs.test-bot.result }}" = "success" ]
