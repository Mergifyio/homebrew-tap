name: brew test-bot

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  test-bot:
    # Skip drafts; marking the PR ready runs it.
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        # The formula installs prebuilt binaries, so test-bot just downloads +
        # tests one per platform (no compile, no bottling) — all four targets the
        # formula pins: macOS arm64 + x86_64, Linux x86_64 + arm64.
        os: [ macos-26, macos-15-intel ]
        include:
          - os: ubuntu-latest
            container: ghcr.io/homebrew/brew:main
          - os: ubuntu-24.04-arm
            container: ghcr.io/homebrew/brew:main
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    permissions:
      contents: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@d0dd492210067c1b5f8857ab6c5dd52c29944e44 # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax

      - run: brew test-bot --only-formulae

  all-greens:
    name: all-greens
    if: ${{ !cancelled() }}
    needs:
      - test-bot
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        uses: Mergifyio/gha-mergify-ci@ae3652692aa88f5aee744a552ee9f1f27a161eaa # v20
        with:
          action: wait-jobs
          jobs: ${{ toJSON(needs) }}
          mergify_cli_version: latest
