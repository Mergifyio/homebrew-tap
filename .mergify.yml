# Mergify is the ONLY actor allowed to merge to `main` (it is the sole ruleset
# bypass actor). Two lanes:
#   - default: human / autobump formula PRs — require approval + the 3 test-bot
#     checks.
#   - bottle: machine bottle PRs opened by publish.yml — already built and
#     uploaded, so no review/CI; gated to bot-authored `bottle/*` branches.
# A human cannot author a PR as github-actions[bot], so the no-review `bottle`
# lane is unreachable by a human even on a `bottle/*`-named branch.
queue_rules:
  - name: default
    merge_conditions:
      - "check-success = test-bot (macos-26)"
      - "check-success = test-bot (ubuntu-latest, ghcr.io/homebrew/brew:main)"
      - "check-success = test-bot (ubuntu-24.04-arm, ghcr.io/homebrew/brew:main)"
      - "#approved-reviews-by >= 1"
    merge_method: merge

  - name: bottle
    merge_conditions: []
    merge_method: merge

pull_request_rules:
  - name: Queue approved formula PRs
    conditions:
      - "base = main"
      - "-draft"
      - "-head ~= ^bottle/"
      - "#approved-reviews-by >= 1"
    actions:
      queue:
        name: default

  - name: Auto-queue machine bottle PRs
    conditions:
      - "base = main"
      - "author = github-actions[bot]"
      - "head ~= ^bottle/"
    actions:
      queue:
        name: bottle
