# Extends the org-shared Mergify config (Mergifyio/.github): conventional-commit
# enforcement, conflict warnings, PR-description + review-thread checks,
# dismiss-stale-approvals, and the default squash commit message (first-commit).
#
# Local additions dogfood the merge queue on the tap. Humans approve formula
# PRs; the publish workflow's machine bottle PRs (bot-authored, on bottle/*)
# auto-merge with no review. Mergify is the only actor allowed to merge to main
# (it is the sole `main` ruleset bypass actor). merge_protections define the
# gate; auto_merge_conditions queues + merges once it passes.
extends: .github

queue_rules:
  - name: default
    queue_conditions:
      - base = main
    merge_method: squash

merge_protections:
  - name: Review and CI required
    # Applies to every PR EXCEPT bot-authored bottle PRs (already built; the
    # formula change they carry was reviewed in its originating PR). A human
    # cannot author a PR as github-actions[bot], so a human PR on a bottle/*
    # branch is still gated here — the author check, not the branch name, is
    # the security boundary.
    if:
      - not:
          and:
            - author = github-actions[bot]
            - head ~= ^bottle/
    success_conditions:
      - "#approved-reviews-by >= 1"
      - check-success = all-green

merge_protections_settings:
  reporting_method: deployments   # restated — local block replaces the inherited one
  auto_merge_conditions: true
