# Dogfood Mergify on the tap. Humans approve formula PRs; the publish workflow's
# machine bottle PRs (bot-authored, on bottle/*) auto-merge with no review.
# Mergify is the only actor allowed to merge to main (it is the sole `main`
# ruleset bypass actor). Modern idiom (per the monorepo): merge_protections
# define the gate, auto_merge_conditions queues + merges once it passes.
queue_rules:
  - name: default
    queue_conditions:
      - base = main
    merge_method: squash
    commit_message_template: |
      {{ title }} (#{{ number }})

      {{ body }}

merge_protections:
  - name: Review and CI required
    # Applies to every PR EXCEPT bot-authored bottle PRs (already built; the
    # formula change they carry was reviewed in its originating PR). A human
    # cannot author a PR as github-actions[bot], so a human PR on a bottle/*
    # branch is still gated here — the author check, not the branch name, is
    # the security boundary.
    if:
      - not:
          and:
            - author = github-actions[bot]
            - head ~= ^bottle/
    success_conditions:
      - "#approved-reviews-by >= 1"
      - check-success = all-green

merge_protections_settings:
  auto_merge_conditions: true
